<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //if condition in js is used to execute a block of code based on a specified condition. 
        // The syntax for an if statement in JavaScript is as follows:
        let age=23;
        if(age>18){
            console.log("You are eligible to vote");
        }
        //if ..else statement is used to execute one block of code if a specified condition is true, 
        // and another block of code if the condition is false. The syntax for an if...else statement 
        // in JavaScript is as follows:
        else{
            console.log("You are not eligible to vote");
        }
        let myage=45;
        if(myage<18){
            console.log("wait for next year");
        }
        else{
            console.log("You are eligible to vote");
        }
        //switch....evaluates an expression and executes the code block corresponding to the matching case.
        //  The syntax for a switch statement in JavaScript is as follows:
         let grade="A";
         switch(grade){
            case "A":
                console.log("First Division");
                break;
            case "B":
                console.log("Second Division");
                break;
            case "C":
                console.log("Third Division");
                break;
            default:
                console.log("fail");
         }
         //if else if statement is used to specify a new condition to test, 
         // if the first condition is false,allowing for multiple conditions to be checked sequentially.
            let mark=67;
            if(mark>=60){
                console.log("first division");
            }
            else if(mark<60 && mark>=40){
                console.log("second division");
            }
            else if(mark<40 && mark>=30){
                console.log("third division");
            }
            else{
                console.log("Fail");
            }
            
               
            }
               
         

        
    </script>
</body>
</html>
