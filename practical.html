<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Calculator</title>
</head>
<body>

<h2>Student Marks & Grade Calculator</h2>

<label>Enter Number of Subjects:</label>
<input type="number" id="subjects">
<button onclick="calculate()">Calculate</button>

<p id="output"></p>

<script>
function calculate() {
    let n = parseInt(document.getElementById("subjects").value);

    let total = 0;
    let pass = true;

    // Loop to enter marks
    for(let i = 1; i <= n; i++) {
        let marks = parseFloat(prompt("Enter marks for Subject " + i));

        total += marks;

        if(marks < 40) {
            pass = false;
        }
    }

    let average = total / n;
    let grade;

    if(average >= 90)
        grade = "A+";
    else if(average >= 80)
        grade = "A";
    else if(average >= 70)
        grade = "B";
    else if(average >= 60)
        grade = "C";
    else if(average >= 50)
        grade = "D";
    else
        grade = "F";

    document.getElementById("output").innerHTML =
        "Total Marks = " + total + "<br>" +
        "Average = " + average.toFixed(2) + "<br>" +
        "Grade = " + grade + "<br>" +
        "Result = " + (pass ? "PASS" : "FAIL");
}
</script>

</body>
</html>
