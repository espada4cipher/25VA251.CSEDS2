<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAVA SCRIPT</title>
</head>
<body>
    <h1>Java Script Variable</h1>
    <script>
       //variable definition?
       //variables are container in js
       var myNname="KARTIK";
       document.write(myNname);
       console.log(myNname);
       //JS Execution and scope(global and local)
       function demo(){
        var msg="Thanks"//Local
        console.log(msg);
       }
       demo();
       //variable declaration using let and const
       let msg2="Thanks Again";
         console.log(msg2);

        const msg3="Thanks again again";
        console.log(msg3);

    </script>
</body>
</html>
